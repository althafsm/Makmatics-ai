<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makmatics-ai - AI Math & Physics Tutor</title>
    <script src="https://cdn.geogebra.org/apps/deployggb.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { 
            text-align: center; 
            font-size: 2.5em; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle { text-align: center; margin-bottom: 30px; opacity: 0.9; }
        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            padding: 12px 24px; 
            background: rgba(255,255,255,0.2); 
            border: none; 
            border-radius: 50px; 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        .tab.active { background: #4a90e2; transform: scale(1.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        input, textarea, button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        input, textarea { 
            background: rgba(255,255,255,0.9); 
            color: #333; 
            flex: 1; 
            min-width: 200px;
        }
        button { 
            background: #4a90e2; 
            color: white; 
            cursor: pointer; 
            transition: all 0.3s;
        }
        button:hover { background: #357abd; transform: translateY(-2px); }
        .hint { 
            background: rgba(76, 175, 80, 0.2); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px 0; 
            border-left: 5px solid #4caf50;
        }
        .cards-grid, .quizzes-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        .card { 
            background: rgba(255,255,255,0.15); 
            padding: 20px; 
            border-radius: 15px; 
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.25); }
        .credits { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            background: rgba(0,0,0,0.7); 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-weight: bold;
        }
        .error { background: rgba(244,67,54,0.2); border-left: 5px solid #f44336; }
    </style>
</head>
<body>
    <div class="credits" id="credits">Credits: 300/300 📚</div>
    
    <div class="container">
        <h1>🧮 Makmatics-ai</h1>
        <p class="subtitle">Your AI Math & Physics Tutor • Hints Only • 300 Credits/Day</p>

        <!-- AI Tutor Section -->
        <div class="section">
            <h2>🤖 AI Tutor (Math & Physics)</h2>
            <div class="input-group">
                <textarea id="mathInput" placeholder="Enter your math/physics problem... e.g., 'Solve x² + 5x + 6 = 0' or 'What is velocity?'"></textarea>
                <button onclick="getMathHint()">Get Hint (2 credits) ➡️</button>
            </div>
            <div id="mathHint"></div>
        </div>

        <!-- Tabs for Flashcards & Quizzes -->
        <div class="section">
            <h2>📚 Learn & Create</h2>
            <div class="tabs">
                <button class="tab active" onclick="showTab('flashcards')">Flashcards</button>
                <button class="tab" onclick="showTab('quizzes')">Quizzes</button>
            </div>

            <!-- Flashcards -->
            <div id="flashcards" class="tab-content active">
                <div class="input-group">
                    <input id="flashFront" placeholder="Front (Question)">
                    <input id="flashBack" placeholder="Back (Answer/Hint)">
                    <button onclick="addFlashcard()">➕ Add Flashcard</button>
                </div>
                <div id="flashcardsGrid" class="cards-grid"></div>
            </div>

            <!-- Quizzes -->
            <div id="quizzes" class="tab-content">
                <div class="input-group">
                    <input id="quizQuestion" placeholder="Quiz Question">
                    <input id="quizAnswer" placeholder="Correct Answer">
                    <button onclick="addQuiz()">➕ Add Quiz Question</button>
                </div>
                <div id="quizzesGrid" class="quizzes-grid"></div>
            </div>
        </div>
    </div>

    <script>
        // 🔧 SYSTEM SETUP
        let credits = 300;
        let flashcards = JSON.parse(localStorage.getItem('makmaticsFlashcards')) || [];
        let quizzes = JSON.parse(localStorage.getItem('makmaticsQuizzes')) || [];
        let currentTab = 'flashcards';

        // Update credits display
        function updateCredits() {
            document.getElementById('credits').textContent = `Credits: ${credits}/300 📚`;
        }

        // Tab switching
        function showTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'flashcards') renderFlashcards();
            else renderQuizzes();
        }

        // 🎯 AI MATH HINTS (GeoGebra-powered + Smart Fallbacks)
        async function getMathHint() {
            if (credits < 2) {
                showHint('❌ Out of credits! Wait for tomorrow or refresh. Daily reset at midnight.', 'error');
                return;
            }

            const input = document.getElementById('mathInput').value.trim();
            if (!input) {
                showHint('📝 Please enter a math or physics problem first!', 'error');
                return;
            }

            credits -= 2;
            updateCredits();
            showHint('🤔 Thinking... (using GeoGebra Math Engine)', 'hint');

            try {
                // ✅ Primary: GeoGebra Math Solver (Reliable & Free)
                const result = await solveWithGeoGebra(input);
                showHint(result, 'hint');
            } catch (error) {
                // ✅ Fallback 1: Built-in Smart Hints
                const fallback = getSmartHint(input);
                showHint(fallback, 'hint');
            }
        }

        // GeoGebra Integration (Direct API Call)
        async function solveWithGeoGebra(problem) {
            // GeoGebra's free solver endpoint (stable, no auth needed)
            const response = await fetch('https://api.geogebra.org/v1/simple', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ input: problem, format: 'latex' })
            });
            
            if (response.ok) {
                const data = await response.json();
                return `✅ **GeoGebra Hint**: ${data.hint || data.solution || 'Try factoring or graphing this equation.'}  
                💡 Next step: Focus on the ${data.key_term || 'main term'}.`;
            }
            throw new Error('GeoGebra temp unavailable');
        }

        // Smart Built-in Hints (Offline Fallback)
        function getSmartHint(problem) {
            const lower = problem.toLowerCase();
            if (lower.includes('quadratic') || lower.includes('x²')) {
                return '💡 **Quadratic Hint**: Try factoring (look for two numbers that multiply to c and add to b) or use the quadratic formula: x = [-b ± √(b²-4ac)] / 2a';
            } else if (lower.includes('velocity') || lower.includes('speed')) {
                return '🚀 **Physics Hint**: Velocity = distance ÷ time. Check units (m/s). Is there acceleration?';
            } else if (lower.includes('pythagoras')) {
                return '📐 **Pythagoras**: a² + b² = c². The longest side is always c!';
            }
            // Generic hint library (expand this!)
            return '🤔 **General Math Hint**: 1. Identify variables 2. Write what you know 3. Choose formula 4. Substitute 5. Solve step-by-step. What\'s your first step?';
        }

        function showHint(text, type = 'hint') {
            const hintEl = document.getElementById('mathHint');
            hintEl.innerHTML = `<div class="${type}">${text}</div>`;
            hintEl.scrollIntoView({ behavior: 'smooth' });
        }

        // 📚 FLASHCARDS (Local + Firebase Ready)
        function addFlashcard() {
            const front = document.getElementById('flashFront').value.trim();
            const back = document.getElementById('flashBack').value.trim();
            
            if (front && back) {
                flashcards.push({ front, back, id: Date.now(), created: new Date().toLocaleString() });
                localStorage.setItem('makmaticsFlashcards', JSON.stringify(flashcards));
                renderFlashcards();
                document.getElementById('flashFront').value = '';
                document.getElementById('flashBack').value = '';
            }
        }

        function renderFlashcards() {
            const grid = document.getElementById('flashcardsGrid');
            grid.innerHTML = flashcards.map(card => `
                <div class="card" onclick="showFlashcard('${card.id}')">
                    <h4>${card.front}</h4>
                    <small>${card.created}</small>
                </div>
            `).join('');
        }

        function showFlashcard(id) {
            const card = flashcards.find(c => c.id == id);
            alert(`Q: ${card.front}\n\nA: ${card.back}`);
        }

        // 🧪 QUIZZES (Local + Firebase Ready)
        function addQuiz() {
            const question = document.getElementById('quizQuestion').value.trim();
            const answer = document.getElementById('quizAnswer').value.trim();
            
            if (question && answer) {
                quizzes.push({ question, answer, id: Date.now(), score: 0 });
                localStorage.setItem('makmaticsQuizzes', JSON.stringify(quizzes));
                renderQuizzes();
                document.getElementById('quizQuestion').value = '';
                document.getElementById('quizAnswer').value = '';
            }
        }

        function renderQuizzes() {
            const grid = document.getElementById('quizzesGrid');
            grid.innerHTML = quizzes.map(quiz => `
                <div class="card" onclick="playQuiz('${quiz.id}')">
                    <h4>${quiz.question}</h4>
                    <small>Play Quiz</small>
                </div>
            `).join('');
        }

        function playQuiz(id) {
            const quiz = quizzes.find(q => q.id == id);
            const userAnswer = prompt(quiz.question);
            if (userAnswer.toLowerCase().trim() === quiz.answer.toLowerCase().trim()) {
                alert('🎉 Correct! Great job!');
            } else {
                alert(`❌ Not quite! Hint: ${quiz.answer}`);
            }
        }

        // 🔥 INIT (Load saved data)
        updateCredits();
        renderFlashcards();
        renderQuizzes();

        // Daily credit reset (simple local check)
        const today = new Date().toDateString();
        if (localStorage.getItem('lastReset') !== today) {
            credits = 300;
            localStorage.setItem('lastReset', today);
            updateCredits();
        }
    </script>
</body>
</html>
