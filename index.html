<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makmatics-ai | Where Math Gets Lit 🔥</title>
    
    <!-- Import Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Math Engine & Fun Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Calculus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@latest/Solve.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --fire: #FF6B35;
            --purple: #7209B7;
            --cyan: #00F5FF;
            --neon: #39FF14;
            --dark: #0D1117;
            --gray: #21262D;
            --light: #F0F6FC;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--light);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 🌌 Animated Background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 80%, var(--purple) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, var(--fire) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, var(--cyan) 0%, transparent 50%);
            filter: blur(100px);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.1); }
        }

        /* 🎮 Gaming Grid Pattern */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--cyan)22 1px, transparent 1px),
                linear-gradient(90deg, var(--cyan)22 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.03;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* 📱 Mobile Container */
        .app-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            background: rgba(33, 38, 45, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--gray);
            border-right: 1px solid var(--gray);
            position: relative;
        }

        /* 📱 Mobile Header (Like TikTok) */
        .mobile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--gray);
        }

        .logo-mobile {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.3em;
            background: linear-gradient(45deg, var(--fire), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--fire);
        }

        .streak-display {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(45deg, var(--fire), var(--purple));
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9em;
        }

        .credits-mobile {
            background: rgba(0, 245, 255, 0.2);
            border: 2px solid var(--cyan);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85em;
            animation: creditGlow 2s ease-in-out infinite;
        }

        @keyframes creditGlow {
            0%, 100% { box-shadow: 0 0 10px var(--cyan)44; }
            50% { box-shadow: 0 0 20px var(--cyan)88; }
        }

        /* 🎯 Main Content Cards */
        .content-card {
            margin: 20px;
            background: rgba(33, 38, 45, 0.8);
            border: 1px solid var(--gray);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-card:hover {
            transform: translateY(-4px);
            border-color: var(--fire);
            box-shadow: 0 12px 40px rgba(255, 107, 53, 0.2);
        }

        .card-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--purple), var(--fire));
            color: white;
            text-align: center;
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .card-subtitle {
            opacity: 0.9;
            font-size: 0.9em;
            font-weight: 400;
        }

        .card-body {
            padding: 25px;
        }

        /* 📝 Input Styles (iOS-like) */
        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: rgba(13, 17, 23, 0.6);
            border: 2px solid var(--gray);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--fire);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        .input-field::placeholder {
            color: #8B949E;
            font-style: italic;
        }

        /* 🎮 Gaming Buttons */
        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 15px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--fire), var(--purple));
            color: white;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--neon), #00CC44);
            color: black;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #FF3366, #FF6B35);
            color: white;
            margin-bottom: 10px;
        }

        /* ⚡ Answer Input Area */
        .answer-zone {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }

        .answer-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--cyan);
            border-radius: 25px;
            color: white;
            font-size: 16px;
            text-align: center;
            font-weight: 600;
        }

        .check-btn {
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--neon), #00DD55);
            border: none;
            border-radius: 25px;
            color: black;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            animation: checkPulse 2s ease-in-out infinite;
        }

        @keyframes checkPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 📊 Output/Results */
        .result-card {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            display: none;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-correct {
            background: rgba(57, 255, 20, 0.2);
            border: 2px solid var(--neon);
            color: var(--neon);
        }

        .result-wrong {
            background: rgba(255, 51, 102, 0.2);
            border: 2px solid #FF3366;
            color: #FF6B9D;
        }

        .result-hint {
            background: rgba(0, 245, 255, 0.2);
            border: 2px solid var(--cyan);
            color: var(--cyan);
        }

        /* 📱 Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--gray);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 107, 53, 0.2);
            color: var(--fire);
        }

        .nav-icon { font-size: 1.2em; }
        .nav-label { font-size: 0.7em; font-weight: 600; }

        /* 🎊 Success Animations */
        .success-burst {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            animation: successPop 0.6s ease;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes successPop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* 📋 Tabs for Tools */
        .tab-nav {
            display: flex;
            background: rgba(13, 17, 23, 0.8);
            border-radius: 15px;
            margin: 20px;
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #8B949E;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--fire), var(--purple));
            color: white;
        }

        .tab-content {
            padding: 0 20px 100px;
        }

        /* 📚 Tool Cards */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .tool-card {
            background: rgba(33, 38, 45, 0.8);
            border: 1px solid var(--gray);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tool-card:hover {
            border-color: var(--fire);
            transform: scale(1.05);
        }

        .tool-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .tool-title {
            font-weight: 600;
            color: var(--fire);
            margin-bottom: 5px;
        }

        /* 💫 Responsive for larger screens */
        @media (min-width: 768px) {
            .app-container {
                max-width: 800px;
                border-radius: 25px;
                margin-top: 20px;
                margin-bottom: 20px;
            }
            
            .bottom-nav {
                border-radius: 0 0 25px 25px;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>

    <!-- Mobile App Container -->
    <div class="app-container">
        
        <!-- Header -->
        <div class="mobile-header">
            <div class="logo-mobile">🔥 Makmatics</div>
            <div class="streak-display">
                <span>⚡</span>
                <span id="streakCount">0</span>
                <span>day streak</span>
            </div>
            <div class="credits-mobile" id="creditDisplay">💎 300</div>
        </div>

        <!-- Main AI Solver -->
        <div class="content-card">
            <div class="card-header">
                <div class="card-title">
                    🧠 AI Math Wizard
                </div>
                <div class="card-subtitle">Drop your hardest problems here 💪</div>
            </div>
            <div class="card-body">
                <textarea 
                    id="problemInput" 
                    class="input-field" 
                    placeholder="Type any math problem... (e.g., solve 2x + 5 = 15)"
                    rows="3"
                ></textarea>
                
                <div>
                    <button class="btn btn-primary" onclick="getHint()">💡 Smart Hint (2💎)</button>
                    <button class="btn btn-danger" onclick="revealAnswer()">🔓 Full Answer (5💎)</button>
                </div>

                <div class="answer-zone">
                    <input type="text" id="userAttempt" class="answer-input" placeholder="Your answer...">
                    <button class="check-btn" onclick="checkUserAnswer()">✅</button>
                </div>

                <div id="aiOutput" class="result-card"></div>
            </div>
        </div>

        <!-- Learning Tools Tabs -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('flashcards', this)">📝 Cards</button>
            <button class="tab-btn" onclick="switchTab('quizzes', this)">❓ Quiz</button>
            <button class="tab-btn" onclick="switchTab('badges', this)">🏆 Badges</button>
        </div>

        <!-- Tab Contents -->
        <div id="flashcards" class="tab-content">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="fFront" class="input-field" placeholder="Question" style="flex: 1;">
                <input id="fBack" class="input-field" placeholder="Answer" style="flex: 1;">
                <button class="btn btn-success" onclick="addFlashcard()">➕</button>
            </div>
            <div id="flashGrid" class="tool-grid"></div>
        </div>

        <div id="quizzes" class="tab-content" style="display: none;">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input id="qQuestion" class="input-field" placeholder="Quiz Question" style="flex: 1;">
                <input id="qAnswer" class="input-field" placeholder="Correct Answer" style="flex: 1;">
                <button class="btn btn-success" onclick="addQuiz()">➕</button>
            </div>
            <div id="quizGrid" class="tool-grid"></div>
        </div>

        <div id="badges" class="tab-content" style="display: none;">
            <div class="tool-grid">
                <div class="tool-card">
                    <div class="tool-icon">🔥</div>
                    <div class="tool-title">Fire Streak</div>
                    <div style="font-size: 0.8em; color: #8B949E;">7 days in a row</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">🧠</div>
                    <div class="tool-title">Big Brain</div>
                    <div style="font-size: 0.8em; color: #8B949E;">100 correct answers</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">⚡</div>
                    <div class="tool-title">Speed Demon</div>
                    <div style="font-size: 0.8em; color: #8B949E;">Solve in under 30s</div>
                </div>
                <div class="tool-card">
                    <div class="tool-icon">🎯</div>
                    <div class="tool-title">Perfectionist</div>
                    <div style="font-size: 0.8em; color: #8B949E;">100% accuracy</div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active">
                <div class="nav-icon">🏠</div>
                <div class="nav-label">Home</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">📊</div>
                <div class="nav-label">Stats</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">🎮</div>
                <div class="nav-label">Battle</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">👥</div>
                <div class="nav-label">Friends</div>
            </div>
            <div class="nav-item">
                <div class="nav-icon">⚙️</div>
                <div class="nav-label">Settings</div>
            </div>
        </div>

    </div>

    <script>
        // 🎮 Game System
        let credits = 300;
        let streak = parseInt(localStorage.getItem('makStreak')) || 0;
        let correctAnswers = parseInt(localStorage.getItem('makCorrect')) || 0;
        
        // Data Storage
        let flashcards = JSON.parse(localStorage.getItem('makFlash')) || [];
        let quizzes = JSON.parse(localStorage.getItem('makQuiz')) || [];

        // Update UI
        function updateDisplay() {
            document.getElementById('creditDisplay').textContent = `💎 ${credits}`;
            document.getElementById('streakCount').textContent = streak;
        }

        // 🧠 Math Solver (Enhanced)
        function solveInternal(input) {
            try {
                input = input.toLowerCase().trim();
                
                if (input.includes('solve') || input.includes('=')) {
                    let equation = input.replace(/solve/g, '').replace(/find x/g, '').trim();
                    let solution = nerdamer.solve(equation, 'x');
                    return { 
                        type: 'equation', 
                        answer: solution.toString().replace(/[\[\]]/g, ''),
                        step: "Move all terms with variables to one side, constants to the other" 
                    };
                }
                
                if (input.match(/[\+\-\*\/\^\(\)0-9\s]/)) {
                    let result = nerdamer(input).evaluate();
                    return { 
                        type: 'calculation', 
                        answer: result.text(),
                        step: "Follow order of operations (PEMDAS)" 
                    };
                }
                
                return { 
                    type: 'text', 
                    answer: "I can solve math equations and calculations!",
                    step: "Try: 'solve 2x + 5 = 15' or '3 * (4 + 2)'" 
                };
                
            } catch (error) {
                return null;
            }
        }

        // 💡 Get Hint
        function getHint() {
            if (credits < 2) {
                showResult('Not enough credits! Complete daily challenges to earn more 💪', 'wrong');
                return;
            }
            
            let input = document.getElementById('problemInput').value;
            if (!input) {
                showResult('Drop a math problem first! 🎯', 'wrong');
                return;
            }

            credits -= 2;
            updateDisplay();

            let result = solveInternal(input);
            
            if (result) {
                showResult(`💡 <strong>Pro Tip:</strong><br>${result.step}<br><br><em>You got this! Think step by step 🧠</em>`, 'hint');
            } else {
                showResult('🤔 Try rephrasing your question. I work best with equations and calculations!', 'hint');
            }
        }

        // ✅ Check Answer
        function checkUserAnswer() {
            let userAnswer = document.getElementById('userAttempt').value.trim();
            let input = document.getElementById('problemInput').value.trim();
            
            if (!userAnswer) {
                showResult('Type your answer first! 📝', 'wrong');
                return;
            }
            
            if (!input) {
                showResult('Need a problem to check against! 🎯', 'wrong');
                return;
            }

            let result = solveInternal(input);
            
            if (!result) {
                showResult('Could not solve this problem automatically 😅', 'wrong');
                return;
            }

            // Clean answers for comparison
            let cleanUser = userAnswer.replace(/[\s\[\]]/g, '').toLowerCase();
            let cleanCorrect = result.answer.replace(/[\s\[\]]/g, '').toLowerCase();

            if (cleanUser === cleanCorrect) {
                // 🎉 CORRECT!
                correctAnswers++;
                localStorage.setItem('makCorrect', correctAnswers);
                
                showSuccessBurst('🎉');
                confetti({ 
                    particleCount: 100, 
                    spread: 70, 
                    origin: { y: 0.6 },
                    colors: ['#FF6B35', '#7209B7', '#00F5FF', '#39FF14']
                });
                
                showResult(`<strong>YESSS! 🔥</strong><br>You absolutely crushed it!<br><br>🏆 Correct Answers: ${correctAnswers}`, 'correct');
                
                // Clear inputs
                document.getElementById('userAttempt').value = '';
                
            } else {
                showResult(`Not quite there yet! 💪<br><br>Keep trying - you're learning with every attempt!<br><em>Hint: The answer is ${result.answer}</em>`, 'wrong');
            }
        }

        // 🔓 Reveal Answer
        function revealAnswer() {
            if (credits < 5) {
                showResult('Need 5💎 to reveal answer! Earn more by solving problems 🎯', 'wrong');
                return;
            }
            
            let input = document.getElementById('problemInput').value;
            let result = solveInternal(input);
            
            if (!result) {
                showResult('Could not solve this automatically 😅', 'wrong');
                return;
            }

            if (confirm('Sure? This costs 5💎! Try solving it first - you might surprise yourself! 💪')) {
                credits -= 5;
                updateDisplay();
                showResult(`🔓 <strong>The answer is: ${result.answer}</strong><br><br>Now try a similar problem to practice! 🎯`, 'hint');
            }
        }

        // 📱 Show Result
        function showResult(message, type) {
            let output = document.getElementById('aiOutput');
            output.innerHTML = message;
            output.className = `result-card result-${type}`;
            output.style.display = 'block';
            
            // Auto hide after 10 seconds
            setTimeout(() => {
                output.style.display = 'none';
            }, 10000);
        }

        // 🎊 Success Animation
        function showSuccessBurst(emoji) {
            let burst = document.createElement('div');
            burst.className = 'success-burst';
            burst.textContent = emoji;
            document.body.appendChild(burst);
            
            setTimeout(() => {
                burst.remove();
            }, 600);
        }

        // 📱 Tab Switching
        function switchTab(tabName, button) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            
            // Remove
